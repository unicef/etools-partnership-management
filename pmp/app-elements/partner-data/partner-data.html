<link rel="import" href="../../../bower_components/polymer/polymer.html">
<link rel="import" href="../../../bower_components/etools-ajax/etools-ajax.html">
<link rel="import" href="../partners-data/partners-data.html">

<dom-module id="partner-data">

  <template>
    <partners-data></partners-data>
  </template>

  <script>

    Polymer({

      is: 'partner-data',

      listeners: {
        "partner-maps-loaded": "getPartner"
      },

      properties: {

        partner: {
          type: Object,
          notify: true,
        },

        _partners: {
          type: Object
        },

        partnerId: {
          type: Number,
          notify: true
        }

      },

      getPartner: function(event) {
        if (!event.details.map) {
          return;
        }
        id = parseInt(this.partnerId);
        if (id) {
          return event.details.map[id];
        } else {
          console.error('You must provide a valid partner ID');
        }
      }

    });

  </script>

</dom-module>
